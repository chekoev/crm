<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>mikro_15 CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%2300ff87'/><text x='50' y='68' text-anchor='middle' font-size='40' font-weight='bold' fill='black'>M15</text></svg>"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow-x: hidden; }
    input, select, button { font-family: inherit; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script>
    // Storage API polyfill for standalone deployment (uses localStorage)
    if (!window.storage) {
      window.storage = {
        async get(key) {
          try {
            const v = localStorage.getItem("m15_" + key);
            return v !== null ? { key, value: v } : null;
          } catch(e) { return null; }
        },
        async set(key, value) {
          try {
            localStorage.setItem("m15_" + key, value);
            return { key, value };
          } catch(e) { return null; }
        },
        async delete(key) {
          try { localStorage.removeItem("m15_" + key); return { key, deleted: true }; }
          catch(e) { return null; }
        },
        async list(prefix) {
          try {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (k.startsWith("m15_" + (prefix||""))) keys.push(k.replace("m15_",""));
            }
            return { keys };
          } catch(e) { return { keys: [] }; }
        }
      };
    }
  </script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
